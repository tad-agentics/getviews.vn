<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Getviews.vn — Trợ lý AI cho TikTok Creator Việt</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css?v=7" />

<style>
  /* ---- Landing-only overrides ---- */
  body { background: var(--canvas); }
  .lp-max { max-width: 1120px; margin: 0 auto; padding: 0 28px; }
  .lp-max-narrow { max-width: 780px; margin: 0 auto; padding: 0 28px; }

  .kicker {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 14px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-deep);
  }

  h2.sec {
    font-family: var(--sans);
    font-weight: 600;
    letter-spacing: -0.03em;
    font-size: clamp(30px, 4vw, 44px);
    line-height: 1.05;
    margin: 0 0 18px;
    color: var(--ink);
  }
  h2.sec em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent); }

  .sec-lede {
    font-size: 15px; color: var(--ink-3);
    max-width: 620px; line-height: 1.55;
    margin: 0;
  }

  /* Top nav */
  .lp-nav {
    border-bottom: 1px solid var(--rule);
    position: sticky; top: 0;
    background: rgba(251, 252, 253, 0.92);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    z-index: 40;
  }
  .lp-nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
  }
  .lp-brand {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--sans);
    font-size: 20px; letter-spacing: -0.04em; font-weight: 700;
  }
  .lp-brand .dot { color: var(--accent-2-deep); }
  .lp-nav-links {
    display: flex; gap: 28px; align-items: center;
    font-size: 13px; color: var(--ink-3);
  }
  .lp-nav-links a:hover { color: var(--ink); }

  /* Hero */
  .hero {
    padding: 64px 0 72px;
    border-bottom: 1px solid var(--rule);
  }
  .hero-grid {
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 72px;
    align-items: center;
  }
  .hero h1 {
    margin: 0;
    font-size: clamp(40px, 6vw, 68px);
    line-height: 0.98;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: var(--ink);
  }
  .hero h1 em {
    font-family: var(--serif);
    font-style: italic; font-weight: 400;
    color: var(--accent);
  }
  .hero-lede {
    font-size: 17px; color: var(--ink-3);
    line-height: 1.55; max-width: 520px;
    margin: 22px 0 28px;
  }
  .hero-lede strong { color: var(--ink); font-weight: 600; }

  /* CTA input */
  .cta-box {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px 8px 18px;
    border: 1px solid var(--ink);
    background: var(--paper);
    border-radius: 999px;
    max-width: 520px;
    transition: box-shadow 0.2s ease;
  }
  .cta-box:focus-within { box-shadow: 0 0 0 4px var(--accent-soft); }
  .cta-box input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-size: 15px; color: var(--ink);
    font-family: var(--sans);
    padding: 10px 0;
  }
  .cta-box input::placeholder { color: var(--ink-4); }
  .cta-box .btn { border-radius: 999px; padding: 11px 20px; }

  .trust-row {
    display: flex; flex-wrap: wrap; gap: 22px;
    margin-top: 18px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .trust-row span { display: inline-flex; align-items: center; gap: 6px; }
  .trust-row .tick {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent-2-soft);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent-2-deep);
    font-size: 9px;
  }

  /* Hero mock card */
  .mock {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 22px;
    position: relative;
    box-shadow: 0 30px 60px -30px rgba(10, 13, 18, 0.15);
  }
  .mock-head {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .mock-avatar {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--ink); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
    letter-spacing: -0.04em;
  }
  .mock-finding {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    background: var(--canvas-2);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .mock-finding .mark {
    width: 20px; height: 20px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 11px; font-weight: 700;
    margin-top: 1px;
  }
  .mock-finding .mark.bad { background: var(--neg-soft); color: var(--neg-deep); }
  .mock-finding .mark.good { background: var(--accent-2-soft); color: var(--accent-2-deep); }
  .mock-finding-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .mock-finding-sub { font-size: 12px; color: var(--ink-3); line-height: 1.45; }

  .float-badge {
    position: absolute;
    background: var(--ink); color: var(--canvas);
    border-radius: 12px;
    padding: 12px 16px;
  }
  .float-stat {
    top: -18px; right: -18px;
    display: flex; align-items: center; gap: 10px;
  }
  .float-stat .n {
    font-family: var(--mono); font-size: 20px; font-weight: 700;
    color: var(--accent-2);
  }
  .float-stat .l {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-4);
    line-height: 1.3;
  }

  /* Ticker */
  .ticker-wrap {
    overflow: hidden;
    border-top: 1px solid var(--rule);
    padding: 18px 0 0;
    margin-top: 52px;
  }
  .ticker-track {
    display: inline-flex; gap: 10px;
    animation: marquee 55s linear infinite;
    white-space: nowrap;
  }
  .ticker-chip {
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px; color: var(--ink-2);
  }
  .ticker-chip .mono { color: var(--ink-4); font-size: 10px; margin-left: 4px; }

  /* Statement block */
  .statement {
    padding: 90px 0;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .statement h2 {
    margin: 0 auto; max-width: 820px; text-align: center;
    font-size: clamp(30px, 4.2vw, 48px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    font-weight: 600;
  }
  .statement h2 em { font-family: var(--serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .niche-row {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    max-width: 860px; margin: 36px auto 0;
  }
  .niche-row .chip { font-size: 12px; padding: 6px 12px; cursor: default; }

  /* Generic section */
  section.block { padding: 90px 0; border-bottom: 1px solid var(--rule); }
  section.block.alt { background: var(--canvas-2); }

  /* Pain points */
  .pain-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;
    margin-top: 54px;
  }
  .pain {
    border-top: 2px solid var(--ink);
    padding-top: 22px;
  }
  .pain .num {
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-4); margin-bottom: 10px;
  }
  .pain h3 {
    margin: 0 0 10px;
    font-size: 20px;
    letter-spacing: -0.02em;
    font-weight: 600;
    line-height: 1.2;
  }
  .pain p { margin: 0; font-size: 14px; color: var(--ink-3); line-height: 1.6; }

  /* How it works */
  .steps {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    margin-top: 54px;
    position: relative;
  }
  .steps::before {
    content: '';
    position: absolute; top: 28px; left: 12%; right: 12%;
    height: 1px; background: var(--rule); z-index: 0;
  }
  .step {
    text-align: left; position: relative; z-index: 1;
    background: var(--canvas);
    padding-right: 8px;
  }
  .step .badge {
    width: 56px; height: 56px; border-radius: 12px;
    background: var(--paper); border: 1px solid var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 18px;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .step h3 {
    margin: 0 0 8px; font-size: 18px; font-weight: 600;
    letter-spacing: -0.02em;
  }
  .step p { margin: 0; font-size: 14px; color: var(--ink-3); line-height: 1.6; }

  /* Live demo */
  .demo-grid {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px;
    margin-top: 50px;
  }
  .demo-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  .demo-card h3 {
    margin: 0 0 18px;
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .demo-card h3 .more {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 500;
    cursor: pointer;
  }
  .demo-card h3 .more:hover { color: var(--accent); }

  .trend-row {
    display: grid; grid-template-columns: 44px 1fr 70px;
    gap: 14px; align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule-2);
  }
  .trend-row:last-child { border-bottom: 0; }
  .trend-thumb {
    width: 44px; height: 60px;
    background: var(--canvas-2); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 9px; color: var(--ink-4);
  }
  .trend-title { font-size: 13px; color: var(--ink); line-height: 1.4; margin-bottom: 4px; }
  .trend-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-4); }
  .trend-views { font-family: var(--mono); font-size: 13px; color: var(--ink); font-weight: 600; text-align: right; }

  .hook-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--rule-2);
  }
  .hook-item:last-child { border-bottom: 0; }
  .hook-item .q { font-size: 13px; color: var(--ink); margin-bottom: 4px; line-height: 1.4; }
  .hook-item .r { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--ink-4); }

  .creators-strip {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 18px;
    overflow: hidden;
  }
  .creators-strip h3 {
    margin: 0 0 18px;
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .strip-row {
    display: flex; gap: 10px;
    animation: marquee 40s linear infinite;
    width: max-content;
  }
  .strip-avatar {
    width: 56px; height: 56px; border-radius: 12px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 18px;
    font-family: var(--sans); letter-spacing: -0.04em;
  }

  /* Results / Before-after */
  .ba {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 36px;
    display: grid; grid-template-columns: 1fr 64px 1fr;
    gap: 24px; align-items: stretch;
    margin-top: 50px;
  }
  .ba-col .label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-4);
    margin-bottom: 16px;
  }
  .ba-col .n {
    font-family: var(--sans);
    font-weight: 600; letter-spacing: -0.04em;
    font-size: 56px; line-height: 1;
  }
  .ba-col .n.dim { color: var(--ink-4); }
  .ba-col .caption { margin-top: 6px; font-size: 13px; color: var(--ink-3); }
  .ba-col ul { list-style: none; padding: 0; margin: 18px 0 0; display: flex; flex-direction: column; gap: 8px; }
  .ba-col ul li { font-size: 13px; color: var(--ink-3); display: flex; gap: 10px; align-items: flex-start; }
  .ba-col ul li .m { flex-shrink: 0; width: 16px; font-weight: 700; }
  .ba-col ul li .m.x { color: var(--neg-deep); }
  .ba-col ul li .m.c { color: var(--accent-2-deep); }
  .ba-arrow {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
  }
  .ba-arrow .circle {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--ink); color: var(--canvas);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .ba-arrow .cap {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-4);
  }
  .ba-foot {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-4);
  }

  /* Testimonials */
  .tes-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 24px;
  }
  .tes {
    background: var(--canvas-2);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 22px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .tes .quote {
    font-family: var(--serif); font-style: italic;
    font-size: 15px; line-height: 1.55;
    color: var(--ink-2);
    margin: 0;
  }
  .tes-foot {
    display: flex; align-items: center; gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
  }
  .tes-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--ink); color: var(--canvas);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .tes-name { font-size: 12px; color: var(--ink); font-weight: 600; }
  .tes-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-4); }
  .tes-stat {
    margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--accent-deep); font-weight: 700;
  }

  /* Pricing */
  .billing-toggle {
    display: inline-flex; padding: 4px;
    border: 1px solid var(--rule); border-radius: 999px;
    background: var(--paper);
    margin: 0 auto 40px;
  }
  .billing-toggle button {
    padding: 8px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    color: var(--ink-3);
    position: relative;
  }
  .billing-toggle button.on {
    background: var(--ink); color: var(--canvas);
    font-weight: 600;
  }
  .save-pill {
    position: absolute;
    top: -8px; right: -8px;
    background: var(--accent); color: white;
    font-family: var(--mono); font-size: 8px;
    padding: 2px 6px; border-radius: 999px;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .plans {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }
  .plan {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 26px;
    position: relative;
    display: flex; flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .plan:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -20px rgba(0,0,0,0.15); }
  .plan.featured { border-color: var(--ink); border-width: 2px; }
  .plan-pop {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--canvas);
    font-family: var(--mono); font-size: 9px;
    padding: 4px 10px; border-radius: 999px;
    letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 600;
  }
  .plan h3 { margin: 0 0 4px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .plan .plan-sub { font-size: 12px; color: var(--ink-4); margin-bottom: 20px; }
  .plan .price {
    font-family: var(--sans); font-weight: 600; letter-spacing: -0.04em;
    font-size: 38px; line-height: 1;
  }
  .plan .price-per { font-family: var(--mono); font-size: 11px; color: var(--ink-4); margin-left: 4px; }
  .plan .plan-feat { margin: 22px 0; list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .plan .plan-feat li { font-size: 13px; color: var(--ink-3); display: flex; gap: 8px; line-height: 1.45; }
  .plan .plan-feat li::before { content: '+'; color: var(--accent); font-weight: 700; }
  .plan .btn { margin-top: auto; justify-content: center; width: 100%; }

  /* FAQ */
  .faq-list {
    display: flex; flex-direction: column; gap: 0;
    margin-top: 40px;
    border-top: 1px solid var(--rule);
  }
  .faq-item {
    border-bottom: 1px solid var(--rule);
  }
  .faq-q {
    width: 100%; text-align: left;
    padding: 22px 4px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 18px;
    font-size: 16px; font-weight: 500; color: var(--ink);
    letter-spacing: -0.01em;
    transition: color 0.15s;
  }
  .faq-q:hover { color: var(--accent); }
  .faq-q .chev {
    flex-shrink: 0; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--ink-4);
    transition: transform 0.2s ease;
  }
  .faq-item.open .faq-q .chev { transform: rotate(45deg); color: var(--accent); }
  .faq-a {
    font-size: 14px; color: var(--ink-3); line-height: 1.65;
    max-width: 680px;
    padding: 0 4px 22px;
  }

  /* Final CTA */
  .final {
    background: var(--ink); color: var(--canvas);
    padding: 100px 0;
    text-align: center;
  }
  .final h2 {
    margin: 0 auto 28px;
    font-family: var(--sans);
    font-size: clamp(32px, 4.5vw, 52px);
    line-height: 1.1;
    letter-spacing: -0.03em;
    font-weight: 600;
    max-width: 640px;
  }
  .final h2 em { font-family: var(--serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .final .btn {
    background: var(--canvas); color: var(--ink); border-color: var(--canvas);
    padding: 14px 32px; font-size: 15px;
  }
  .final .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .final .fine {
    margin-top: 18px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-4);
  }

  /* Footer */
  .lp-foot {
    background: var(--ink);
    color: var(--ink-4);
    padding: 40px 0;
    border-top: 1px solid #1A1E26;
    font-size: 12px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .lp-foot .brand { color: var(--canvas); font-size: 15px; font-weight: 600; letter-spacing: -0.03em; }
  .lp-foot a { color: var(--ink-4); }
  .lp-foot a:hover { color: var(--canvas); }

  /* Sticky bottom bar */
  .stick {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--ink); color: var(--canvas);
    border-top: 1px solid #1A1E26;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 50;
  }
  .stick.on { transform: translateY(0); }
  .stick-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    max-width: 1120px; margin: 0 auto;
  }
  .stick-brand { font-size: 15px; font-weight: 600; letter-spacing: -0.03em; }
  .stick .btn {
    background: var(--accent); color: white; border-color: var(--accent);
    padding: 10px 18px; font-size: 13px;
  }

  /* Mobile */
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .mock-right-only { display: none; }
    .pain-grid, .steps, .demo-grid, .plans, .tes-grid {
      grid-template-columns: 1fr !important;
    }
    .steps::before { display: none; }
    .ba { grid-template-columns: 1fr; padding: 24px; }

          </div>
        </div>
      </section>

      {/* ── Pricing ─────────────────────────────────────── */}
      <section className="block" id="pricing">
        <div className="lp-max">
          <div className="eyebrow" style={{ textAlign: 'center' }}>Gói cước</div>
          <h2 className="sec" style={{ textAlign: 'center' }}>
            Chọn gói <em>phù hợp</em>
          </h2>
          <p className="sec-lede" style={{ textAlign: 'center', margin: '0 auto 36px' }}>
            Thanh toán qua MoMo, VNPay, chuyển khoản, hoặc thẻ quốc tế. Huỷ bất cứ lúc nào.
          </p>

          <div style={{ textAlign: 'center' }}>
            <div className="billing-toggle">
              <button className={billing === 'monthly' ? 'on' : ''} onClick={() => setBilling('monthly')}>
                Tháng
              </button>
              <button className={billing === 'annual' ? 'on' : ''} onClick={() => setBilling('annual')}>
                Năm
                {billing !== 'annual' && <span className="save-pill">-20%</span>}
              </button>
            </div>
          </div>

          <div className="plans">
            {PLANS[billing].map(p => (
              <div className={`plan ${p.pop ? 'featured' : ''}`} key={p.name}>
                {p.pop && <div className="plan-pop">Phổ biến nhất</div>}
                <h3>{p.name}</h3>
                <div className="plan-sub">{p.name === 'Free' ? 'Dành cho người mới' : p.name === 'Pro' ? 'Dành cho creator đang nghiêm túc' : 'Dành cho agency & team'}</div>
                <div>
                  <span className="price">{p.price}</span>
                  <span className="price-per">{p.sub}</span>
                </div>
                <ul className="plan-feat">
                  {p.feats.map((f, i) => <li key={i}>{f}</li>)}
                </ul>
                <a href="Getviews Studio.html" className={`btn ${p.pop ? '' : 'btn-ghost'}`}>
                  {p.cta}
                </a>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── FAQ ─────────────────────────────────────────── */}
      <section className="block alt" id="faq">
        <div className="lp-max-narrow">
          <div className="eyebrow">Câu hỏi thường gặp</div>
          <h2 className="sec">
            Những thắc mắc <em>phổ biến</em>
          </h2>

          <div className="faq-list">
            {FAQS.map((f, i) => (
              <div className={`faq-item ${openFaq === i ? 'open' : ''}`} key={i}>
                <button className="faq-q" onClick={() => setOpenFaq(openFaq === i ? -1 : i)}>
                  <span>{f.q}</span>
                  <span className="chev">+</span>
                </button>
                {openFaq === i && (
                  <div className="faq-a">{f.a}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── Final CTA ───────────────────────────────────── */}
      <section className="final">
        <div className="lp-max">
          <h2>
            Dán một link.<br />
            Xem Getviews <em>nói gì.</em>
          </h2>
          <a href="Getviews Studio.html" className="btn">
            Soi video miễn phí →
          </a>
          <div className="fine">10 lần miễn phí · Không cần thẻ</div>
        </div>
      </section>

      {/* ── Footer ──────────────────────────────────────── */}
      <footer style={{ background: 'var(--ink)' }}>
        <div className="lp-max lp-foot">
          <div>
            <div className="brand">Getviews<span style={{ color: 'var(--accent-2-deep)' }}>.vn</span></div>
            <div style={{ marginTop: 4 }}>© 2026 · Trợ lý AI cho TikTok Creator Việt</div>
          </div>
          <div style={{ display: 'flex', gap: 20 }}>
            <a href="#">Điều khoản</a>
            <a href="#">Bảo mật</a>
            <a href="mailto:hi@getviews.vn">Liên hệ</a>
          </div>
        </div>
      </footer>

      {/* ── Sticky CTA ──────────────────────────────────── */}
      <div className={`stick ${sticky ? 'on' : ''}`}>
        <div className="stick-inner">
          <div className="stick-brand">Getviews<span style={{ color: 'var(--accent)' }}>.vn</span></div>
          <a href="Getviews Studio.html" className="btn">Soi video miễn phí →</a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LandingPage />);
</script>
</body>
</html>
