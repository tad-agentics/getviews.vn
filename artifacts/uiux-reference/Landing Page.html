<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Getviews — Một cách khác để làm TikTok</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css?v=7" />

<style>
  /* ═══════════════════════════════════════════════════
     Landing — matches Getviews Studio aesthetic:
     warm canvas, neo-brutalist ink borders, coral accent,
     mono eyebrows, hand-rotated highlight, black marquee.
     ═══════════════════════════════════════════════════ */

  body { background: var(--canvas); color: var(--ink); }

  .max { max-width: 1240px; margin: 0 auto; padding: 0 28px; }
  .max-n { max-width: 820px; margin: 0 auto; padding: 0 28px; }

  .kicker {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .kicker::before {
    content: '●';
    font-size: 8px;
    color: var(--accent);
  }
  .kicker.cyan { color: var(--accent-2-deep); }
  .kicker.cyan::before { color: var(--accent-2-deep); }
  .kicker.muted { color: var(--ink-4); }
  .kicker.muted::before { color: var(--ink-4); }

  /* ═══════════════════════════════════════════════════
     NAV
     ═══════════════════════════════════════════════════ */
  .nav {
    position: sticky; top: 0;
    z-index: 50;
    background: rgba(251,252,253,0.88);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .nav-mark {
    width: 30px; height: 30px;
    background: var(--ink); color: var(--accent);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-weight: 800;
    font-size: 14px; letter-spacing: -0.06em;
  }
  .nav-word {
    font-family: var(--sans); font-weight: 700;
    font-size: 19px; letter-spacing: -0.04em;
    line-height: 1;
  }
  .nav-word .dot { color: var(--accent-2-deep); }
  .nav-sub {
    font-family: var(--mono); font-size: 9px;
    color: var(--ink-4); font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 2px;
  }
  .nav-links {
    display: flex; align-items: center; gap: 24px;
    font-size: 13px; color: var(--ink-3);
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links .btn { margin-left: 4px; }

  /* ═══════════════════════════════════════════════════
     TICKER — black bar, mono, coral tags (Studio reuse)
     ═══════════════════════════════════════════════════ */
  .ticker-bar {
    background: var(--ink); color: var(--canvas);
    overflow: hidden; padding: 9px 0;
    border-bottom: 1px solid var(--rule);
  }
  .ticker-bar .marquee-track {
    font-family: var(--mono); font-size: 11px;
    gap: 40px;
  }
  .ticker-bar .marquee-track > span {
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ticker-bar .tag {
    color: var(--accent); font-weight: 600;
    letter-spacing: 0.08em;
  }
  .ticker-bar .tag-cy { color: var(--accent-2); }
  .ticker-bar .body { opacity: 0.88; }
  .ticker-bar .sep { opacity: 0.35; }

  /* ═══════════════════════════════════════════════════
     HERO — editorial, warm canvas
     ═══════════════════════════════════════════════════ */
  .hero {
    padding: 64px 0 84px;
    border-bottom: 1px solid var(--rule);
    position: relative;
    overflow: hidden;
  }
  .hero-top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 14px;
    margin-bottom: 36px;
  }
  .hero-h {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(48px, 8.6vw, 120px);
    line-height: 0.96;
    letter-spacing: -0.045em;
    color: var(--ink);
    max-width: 15ch;
    margin: 0;
  }
  .hero-h .soft { color: var(--ink-4); font-weight: 500; }
  .hero-h .rot {
    background: var(--accent); color: white;
    padding: 0 16px;
    border-radius: 14px;
    display: inline-block;
    transform: rotate(-1.2deg);
    font-weight: 700;
  }
  .hero-h .rot-cy {
    background: var(--accent-2-deep); color: white;
    padding: 0 16px;
    border-radius: 14px;
    display: inline-block;
    transform: rotate(0.8deg);
    font-weight: 700;
  }

  .hero-body {
    display: grid;
    grid-template-columns: 1fr 0.85fr;
    gap: 80px;
    align-items: end;
    margin-top: 56px;
  }
  .hero-caption {
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 48ch;
  }
  .hero-caption .lead {
    font-family: var(--serif);
    font-size: 22px; line-height: 1.4;
    font-style: italic;
    color: var(--ink);
    display: block;
    margin-bottom: 8px;
  }
  .hero-caption strong { font-weight: 600; color: var(--ink); }

  /* Neo-brutalist composer — mirrors Studio's hero composer */
  .cta {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 4px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .cta-top {
    padding: 16px 20px 10px;
  }
  .cta-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-4); font-weight: 600;
    margin-bottom: 8px;
  }
  .cta-input {
    display: flex; align-items: center; gap: 10px;
  }
  .cta-input input {
    flex: 1;
    background: transparent;
    border: 0; outline: 0;
    font-family: var(--sans);
    font-size: 17px; color: var(--ink);
    padding: 6px 0;
  }
  .cta-input input::placeholder { color: var(--ink-4); }
  .cta-bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-top: 1px solid var(--rule);
    gap: 10px;
  }
  .cta-bottom .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cta-bottom .btn { padding: 9px 18px; }

  .hero-meta {
    display: flex; gap: 16px; margin-top: 18px;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-4); letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-meta .check {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hero-meta .check::before {
    content: '+'; color: var(--accent); font-weight: 700;
  }

  /* ═══════════════════════════════════════════════════
     Sections — editorial spacing
     ═══════════════════════════════════════════════════ */
  section.block {
    padding: 96px 0;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  section.block.alt { background: var(--canvas-2); }

  .sec-head {
    margin-bottom: 56px;
  }
  .sec-h {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(32px, 4.4vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 10px 0 0;
    max-width: 20ch;
  }
  .sec-h em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .sec-lede {
    margin-top: 14px;
    font-size: 15px;
    color: var(--ink-3);
    max-width: 52ch;
    line-height: 1.55;
  }

  /* ═══════════════════════════════════════════════════
     § 01 — MANIFESTO PILLARS
     ═══════════════════════════════════════════════════ */
  .pillars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    border-radius: 12px;
    overflow: hidden;
  }
  .pillar {
    background: var(--paper);
    padding: 28px 28px 32px;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 220px;
    transition: background 0.2s ease;
  }
  .pillar:hover { background: var(--canvas-2); }
  .pillar .num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-4);
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .pillar .num .numeral {
    color: var(--accent);
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    letter-spacing: 0;
    line-height: 1;
    text-transform: none;
  }
  .pillar:nth-child(2) .num .numeral { color: var(--accent-2-deep); }
  .pillar:nth-child(2) h3 em { color: var(--accent-2-deep); }
  .pillar h3 {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.15;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
  }
  .pillar h3 em {
    font-family: var(--serif);
    font-style: italic; font-weight: 400;
    color: var(--accent);
  }
  .pillar p {
    font-size: 13.5px;
    color: var(--ink-3);
    line-height: 1.6;
    margin: 0;
  }

  /* ═══════════════════════════════════════════════════
     § 02 — AUTOPSY
     ═══════════════════════════════════════════════════ */
  .autopsy-head {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 48px;
  }
  .autopsy-meta {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-4); letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.6; text-align: right;
  }
  .autopsy-meta .handle { color: var(--ink); font-weight: 600; }

  .autopsy-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 56px;
    align-items: start;
  }

  .phone {
    position: relative;
    aspect-ratio: 9 / 16;
    background: var(--ink);
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
  }
  .phone-reel {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(254,44,85,0.08) 0%, transparent 30%),
      linear-gradient(0deg, rgba(37,244,238,0.04) 0%, transparent 40%),
      #1a1a24;
  }
  .phone-ts {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 9px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
  }
  .phone-progress {
    position: absolute; bottom: 64px; left: 14px; right: 14px;
    height: 2px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .phone-progress .fill {
    height: 100%; width: 34%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(254,44,85,0.5);
  }
  .phone-scrub {
    position: absolute;
    top: 48%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .phone-scrub .time {
    font-family: var(--mono); font-size: 13px;
    color: white; letter-spacing: 0.05em;
    font-weight: 500;
  }
  .phone-scrub .crosshair {
    width: 44px; height: 44px;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    position: relative;
  }
  .phone-scrub .crosshair::before,
  .phone-scrub .crosshair::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.35);
  }
  .phone-scrub .crosshair::before { top: 50%; left: 0; right: 0; height: 1px; }
  .phone-scrub .crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; }
  .phone-label {
    position: absolute; bottom: 18px; left: 14px;
    font-family: var(--mono); font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.12em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .phone-label::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }

  /* Findings list */
  .findings {
    display: flex; flex-direction: column;
  }
  .finding {
    display: grid;
    grid-template-columns: 78px 64px 1fr auto;
    align-items: center;
    gap: 22px;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }
  .finding:first-child { padding-top: 0; }
  .finding:last-child { border-bottom: 0; }
  .finding .t {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4); letter-spacing: 0.06em;
  }
  .finding .sig {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 600;
  }
  .finding.bad .sig { color: var(--accent-deep); }
  .finding.good .sig { color: var(--accent-2-deep); }
  .finding.good .stat b { color: var(--accent-2-deep); }
  .finding .msg {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    line-height: 1.25;
    letter-spacing: -0.005em;
    color: var(--ink);
  }
  .finding .stat {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: 0.05em;
    text-align: right;
    white-space: nowrap;
  }
  .finding .stat b { color: var(--ink); font-weight: 700; }

  .verdict {
    margin-top: 44px;
    padding: 26px 32px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    box-shadow: 6px 6px 0 var(--ink);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 18px;
  }
  .verdict-text {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 19px;
    letter-spacing: -0.02em;
    line-height: 1.4;
    color: var(--ink);
    max-width: 52ch;
  }
  .verdict-text em {
    background: var(--accent-2-deep); color: white;
    padding: 1px 10px;
    border-radius: 8px;
    font-style: normal;
    font-weight: 700;
    white-space: nowrap;
  }
  .verdict-meta {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-4); letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════════════
     § 03 — PRICING
     ═══════════════════════════════════════════════════ */
  .pricing-head {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px; align-items: end;
    margin-bottom: 36px;
  }

  .billing-row { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .toggle {
    display: inline-flex;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 3px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .toggle button {
    padding: 8px 18px;
    border-radius: 999px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-3);
    white-space: nowrap;
  }
  .toggle button .save {
    margin-left: 6px;
    padding: 2px 6px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-size: 9px;
    letter-spacing: 0.1em;
  }
  .toggle button.on .save { background: var(--accent); color: white; }
  .toggle button.on {
    background: var(--ink); color: var(--canvas);
  }

  .plans {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    border-radius: 14px;
    overflow: hidden;
  }
  .plan {
    background: var(--paper);
    padding: 36px 30px 30px;
    position: relative;
    display: flex; flex-direction: column;
    min-height: 440px;
    transition: background 0.2s ease;
  }
  .plan:hover { background: var(--canvas-2); }
  .plan.featured {
    background: var(--ink);
    color: var(--canvas);
    position: relative;
  }
  .plan.featured::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% -10%, rgba(37,244,238,0.18) 0%, transparent 55%);
    pointer-events: none;
  }
  .plan.featured .plan-desc,
  .plan.featured .plan-per,
  .plan.featured .plan-feats li { color: rgba(247,245,240,0.75); }
  .plan.featured .plan-name,
  .plan.featured .plan-price { color: var(--canvas); }
  .plan.featured .plan-feats li::before { color: var(--accent); }

  .plan .flag {
    position: absolute; top: 16px; right: 16px;
    background: var(--accent); color: white;
    padding: 4px 10px;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase;
    border-radius: 999px;
    font-weight: 600;
  }
  .plan-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 34px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 6px;
  }
  .plan-desc {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-4); letter-spacing: 0.16em;
    text-transform: uppercase; font-weight: 600;
    margin-bottom: 28px;
  }
  .plan-price-row { display: flex; align-items: baseline; gap: 6px; }
  .plan-price {
    font-family: var(--sans); font-weight: 600;
    font-size: 44px; letter-spacing: -0.04em;
    color: var(--ink); line-height: 1;
  }
  .plan-per {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4); letter-spacing: 0.05em;
  }
  .plan-feats {
    list-style: none;
    margin: 28px 0;
    padding: 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .plan-feats li {
    font-size: 13px; color: var(--ink-2);
    padding-left: 20px;
    position: relative;
    line-height: 1.5;
  }
  .plan-feats li::before {
    content: '+';
    position: absolute; left: 0; top: 0;
    color: var(--accent); font-weight: 700;
    font-family: var(--mono);
  }
  .plan-cta {
    margin-top: auto;
    width: 100%;
    text-align: center;
    padding: 12px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    transition: all 0.15s ease;
    border: 1px solid var(--ink);
    color: var(--ink);
    background: var(--paper);
    display: block;
  }
  .plan-cta:hover {
    background: var(--ink); color: var(--canvas);
    transform: translateY(-1px);
  }
  .plan.featured .plan-cta {
    background: var(--accent-2); color: var(--ink);
    border-color: var(--accent-2);
    font-weight: 700;
  }
  .plan.featured .plan-cta:hover {
    background: var(--canvas); color: var(--ink);
    border-color: var(--canvas);
  }
  .plan.featured .flag {
    background: var(--accent-2); color: var(--ink);
  }

  /* ═══════════════════════════════════════════════════
     § 04 — FINAL INVITATION
     ═══════════════════════════════════════════════════ */
  .final {
    background: var(--ink);
    color: var(--canvas);
    padding: 120px 0 108px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .final::before {
    content: '';
    position: absolute;
    top: 50%; left: 30%;
    transform: translate(-50%, -50%);
    width: 520px; height: 520px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(254,44,85,0.24) 0%, transparent 70%);
    pointer-events: none;
  }
  .final::after {
    content: '';
    position: absolute;
    top: 50%; left: 70%;
    transform: translate(-50%, -50%);
    width: 520px; height: 520px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,244,238,0.20) 0%, transparent 70%);
    pointer-events: none;
  }
  .final-inner { position: relative; z-index: 1; }
  .final .kicker {
    color: var(--accent);
    margin-bottom: 32px;
    justify-content: center;
  }
  .final-h {
    font-family: var(--sans); font-weight: 600;
    font-size: clamp(44px, 7vw, 108px);
    line-height: 0.96;
    letter-spacing: -0.04em;
    color: var(--canvas);
    margin-bottom: 36px;
    max-width: 14ch;
    margin-left: auto; margin-right: auto;
  }
  .final-h em {
    font-family: var(--serif); font-style: italic;
    font-weight: 400;
    color: var(--accent-2);
  }
  .final .btn {
    padding: 14px 28px;
    font-size: 14px;

// ─── Reveal-on-scroll ──────────────────────
function useReveal() {
  const ref = React.useRef(null);
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current || seen) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setSeen(true); io.disconnect(); }
    }, { threshold: 0.15 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [seen]);
  return [ref, seen];
}
function Reveal({ children, stagger, className = '', ...rest }) {
  const [ref, seen] = useReveal();
  const cls = stagger
    ? `reveal-stagger ${seen ? 'in' : ''} ${className}`
    : `reveal ${seen ? 'in' : ''} ${className}`;
  return <div ref={ref} className={cls} {...rest}>{children}</div>;
}
